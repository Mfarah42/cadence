<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadence</title><style>
:root{--paper:#F4EFEB;--cream:#FEFAF5;--ink:#1D1D1E;--ink2:#7A7977;--hair:#DBDAD7;--clay:#D97D56;--clayDeep:#B5613D;--peach:#F2E0D2}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:64px 24px 96px}
.brand{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:28px;letter-spacing:-.01em}
.brand .dot{color:var(--clay)}
h1{font-family:Georgia,"Times New Roman",serif;font-weight:600;font-size:40px;margin:8px 0 4px;letter-spacing:-.02em}
h2{font-size:20px;margin:38px 0 8px;color:var(--ink)}
.meta{color:var(--ink2);font-size:14px;margin-bottom:28px}
p,li{color:#33312f;font-size:17px}
a{color:var(--clayDeep)}
.card{background:var(--cream);border:1px solid var(--hair);border-radius:18px;padding:22px 26px;margin:22px 0}
.lead{font-size:19px}
strong{color:var(--ink)}
hr{border:none;border-top:1px solid var(--hair);margin:40px 0}
footer{color:var(--ink2);font-size:14px;margin-top:48px}
.q{font-weight:700;color:var(--ink);margin-top:22px}
</style></head>
<body><div class="wrap"><div class="brand">Cadence<span class="dot">.</span></div>
<h1>Cadence</h1><div class="meta">The calm shift calendar that tells you: am I on or off?</div>
<div class="card"><p style="margin:0 0 8px"><a href="privacy.html">Privacy Policy</a></p><p style="margin:0"><a href="support.html">Support</a></p></div>
<footer>Cadence — the calm shift calendar. © 2026 Mohamed Farah.</footer>
</div></body></html>
